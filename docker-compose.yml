services:
  mongo:
    image: mongo:7
    container_name: doan-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_HOST_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-123456}
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: doan-backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "${BACKEND_HOST_PORT:-5001}:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-123456}@mongo:27017/doan_cms?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-replace_with_strong_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace_with_another_strong_secret}
      ACCESS_TOKEN_EXPIRE: ${ACCESS_TOKEN_EXPIRE:-15m}
      REFRESH_TOKEN_EXPIRE: ${REFRESH_TOKEN_EXPIRE:-7d}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8081}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:-10mb}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      LOG_LEVEL: ${LOG_LEVEL:-info}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: doan-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-8081}:80"

volumes:
  mongodb_data:
