name: prod

services:
  mongo:
    image: mongo:7
    restart: on-failure:5
    mem_limit: 512m
    cpus: "0.5"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?set MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - internal
    healthcheck:
      test:
        - CMD-SHELL
        - mongosh --quiet "mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@127.0.0.1:27017/admin?authSource=admin" --eval "db.adminCommand('ping').ok" | grep 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    restart: on-failure:5
    mem_limit: 256m
    cpus: "0.25"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:?set MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/doan_cms?authSource=admin
      ADMIN_USERNAME: ${ADMIN_USERNAME:?set ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      ACCESS_TOKEN_EXPIRE: ${ACCESS_TOKEN_EXPIRE:-15m}
      REFRESH_TOKEN_EXPIRE: ${REFRESH_TOKEN_EXPIRE:-7d}
      COOKIE_SECURE: "true"
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:-10mb}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    networks:
      - internal
    volumes:
      # Persist uploaded media files across restarts
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:5000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_API_BASE_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: on-failure:5
    mem_limit: 128m
    cpus: "0.25"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: on-failure:5
    mem_limit: 128m
    cpus: "0.25"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      LETSENCRYPT_DOMAIN: ${LETSENCRYPT_DOMAIN:?set LETSENCRYPT_DOMAIN}
    volumes:
      - ./nginx.prod.conf:/etc/nginx/templates/default.conf.template:ro
      - ./nginx.prod.http-fallback.conf:/etc/nginx/templates/http-fallback.conf:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    command:
      - /bin/sh
      - -c
      - >
        CERT_FILE="/etc/letsencrypt/live/$${LETSENCRYPT_DOMAIN}/fullchain.pem";
        KEY_FILE="/etc/letsencrypt/live/$${LETSENCRYPT_DOMAIN}/privkey.pem";
        if [ -f "$$CERT_FILE" ] && [ -f "$$KEY_FILE" ]; then
          envsubst '$$LETSENCRYPT_DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf;
          echo "Loaded HTTPS config for $${LETSENCRYPT_DOMAIN}.";
        else
          cp /etc/nginx/templates/http-fallback.conf /etc/nginx/conf.d/default.conf;
          echo "SSL certificates are missing. Loaded HTTP fallback config.";
        fi;
        exec nginx -g 'daemon off;'
    networks:
      - internal
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -c
      - >
        while :; do
          certbot certonly --webroot --webroot-path=/var/www/certbot
          --email "$${LETSENCRYPT_EMAIL}"
          --agree-tos --no-eff-email
          -d "$${LETSENCRYPT_DOMAIN}";
          sleep 12h;
          certbot renew --webroot --webroot-path=/var/www/certbot;
          sleep 12h;
        done
    environment:
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?set LETSENCRYPT_EMAIL}
      LETSENCRYPT_DOMAIN: ${LETSENCRYPT_DOMAIN:?set LETSENCRYPT_DOMAIN}
    networks:
      - edge

  mongo-backup:
    image: mongo:7
    restart: on-failure:5
    mem_limit: 128m
    cpus: "0.25"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: doan_cms
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?set MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-43200}
    volumes:
      - mongodb_backups:/backups
      - ./ops/mongo-backup.sh:/usr/local/bin/mongo-backup.sh:ro
    entrypoint:
      - /bin/sh
      - /usr/local/bin/mongo-backup.sh
    command:
      - loop
    networks:
      - internal

volumes:
  mongodb_data:
  mongodb_backups:
  uploads_data:
  certbot_www:
  letsencrypt:

networks:
  internal:
    internal: true
  edge: